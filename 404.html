<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Page Not Found | Tazza</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(to right, #0f7404, #5cb917);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

.error-box {
  max-width: 600px;
}

.error-box h1 {
  font-size: 10rem;
  font-weight: bold;
}

.error-box h2 {
  font-size: 3rem;
  margin-bottom: 1rem;
}

.error-box p {
  font-size: 1.6rem;
  margin-bottom: 2rem;
}

.btn-home {
  background: white;
  color: #0f7404;
  padding: 10px 25px;
  border-radius: 30px;
  font-weight: bold;
  text-decoration: none;
}

.btn-home:hover {
  background: #03262c;
  color: white;
}
</style>

</head>

<body>

<div class="error-box">
  <h1>404</h1>
  <h2>Oops! Page Not Found</h2>
  <p>The page you are looking for might have been removed or does not exist.</p>

  <a href="index.html" class="btn-home">Go Back Home</a>
</div>

</body>
</html>
